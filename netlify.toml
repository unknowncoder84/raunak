# Netlify Configuration for BlockShop Marketplace

[build]
  # Build command with legacy peer deps and CI=false to ignore warnings
  command = "cd frontend && CI=false npm install --legacy-peer-deps && CI=false npm run build"
  
  # Directory with the build output
  publish = "frontend/build"
  
  # Base directory for the build
  base = "/"

[build.environment]
  # Node version - upgrade to 20 for Supabase compatibility
  NODE_VERSION = "20"
  
  # React environment
  REACT_APP_DEMO_MODE = "true"
  REACT_APP_SUPABASE_URL = "https://ddytpnlvtjcymlqekbda.supabase.co"
  REACT_APP_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeXRwbmx2dGpjeW1scWVrYmRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTk4NjYsImV4cCI6MjA4Nzg3NTg2Nn0.abxicjNc-n3oWzsljI-bbrc3d9mTcEb2Aa_cqewEi1I"
  
  # Disable treating warnings as errors in CI
  CI = "false"

# Redirect rules for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
